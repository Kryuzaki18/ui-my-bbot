<div class="w-full text-white">
  @if (
    (appSettingsService.isLoadingOpenOrders$ | async) ||
    (appSettingsService.isLoadingPositions$ | async)
  ) {
    <div class="h-2 mt-1">
      <p-progressbar mode="indeterminate" [style]="{ height: '6px' }" color="bg-gray-600" />
    </div>
  }

  <p-tabs value="0">
    <p-tablist>
      <p-tab value="0">
        <div class="flex items-center text-xs">
          <span> Positions </span>
          @if (enrichedPositions().length > 0) {
            <span> ({{ enrichedPositions().length }}) </span>
          }
        </div>
      </p-tab>
      <p-tab value="1">
        <div class="flex items-center text-xs">
          <span> Open Orders </span>
          @if (allOpenOrders().length > 0) {
            <span> ({{ allOpenOrders().length }}) </span>
          }
        </div>
      </p-tab>
    </p-tablist>

    <p-tabpanels class="!px-1">
      <p-tabpanel value="0">
        <app-positions
          [positions]="enrichedPositions()"
          (onClosePosition)="closePosition($event)"
          (onSelectSymbol)="selectSymbol($event)"
          (onOpenTPSLDialog)="openTPSLDialog($event)"
          (onRemoveTPSL)="removeTPSL($event)"
        ></app-positions>
      </p-tabpanel>

      <p-tabpanel value="1">
        <app-open-orders
          [ordersCount]="ordersCount()"
          [visibleOrders]="visibleOrders()"
          [orderTypeFilter]="orderTypeFilter()"
          (onFilterChange)="orderTypeFilter.set($event)"
          (onCancelOrder)="cancelOrder($event)"
          (onSelectSymbol)="selectSymbol($event)"
        ></app-open-orders>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
