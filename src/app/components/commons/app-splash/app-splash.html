@if (splashService.isRendered()) {
  <div class="splash-overlay" [class.is-exiting]="splashService.phase() === 'done'">
    <div class="splash-bg">
      <div class="splash-grid"></div>
      <div class="glow-orb glow-orb-1"></div>
      <div class="glow-orb glow-orb-2"></div>
      <div class="scan-line"></div>
    </div>

    <div class="splash-content">
      <div class="chart-bars">
        @for (bar of candleBars; track $index) {
          <div
            class="candle"
            [class.bullish]="bar.bullish"
            [class.bearish]="!bar.bullish"
            [style.height.%]="bar.height"
            [style.animation-delay]="bar.delay"
          ></div>
        }
      </div>

      <div class="brand-row">
        <div class="brand-icon-wrap">
          <img src="/binance_logo.svg" alt="Binance" class="brand-logo" />
        </div>
        <h1 class="brand-name">Bbot</h1>
      </div>
    </div>
  </div>
}
