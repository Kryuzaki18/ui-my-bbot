<header class="bg-gray-900 flex items-center justify-center sticky top-0 z-[100] w-full shadow-lg">
  <div
    class="flex items-center justify-between container max-w-[1440px] w-full mx-auto px-2 md:px-0"
  >
    <div class="pl-3 flex items-center gap-2">
      <img src="/binance_logo.svg" alt="binance" width="20px" />
      <h1 class="text-emerald-500 text-md font-bold">BBot.v1</h1>
      <h1
        class="flex items-center gap-1 text-gray-800 text-[10px] font-bold px-1.5 py-0.5 bg-yellow-500 rounded"
      >
        <span class="relative flex h-2 w-2">
          <span
            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75 border border-red-500"
          ></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
        </span>

        Futures {{ appSettingsService.isTestnet() ? 'Demo' : 'Live' }}
      </h1>
    </div>

    @if (authService.isLoggedIn()) {
      <div class="hidden min-[769px]:flex items-center px-2">
        <p-button
          size="small"
          [rounded]="true"
          severity="contrast"
          (onClick)="signout()"
          class="shadow-md"
        >
          <div class="flex items-center gap-1">
            <span class="pi pi-sign-out !text-xs"></span>
            <span class="text-xs jetbrains-bold">Signout</span>
          </div>
        </p-button>
      </div>
    } @else {
      <div class="flex items-center px-2">
        <p-button
          size="small"
          [rounded]="true"
          severity="contrast"
          (onClick)="signin()"
          class="shadow-md"
        >
          <div class="flex items-center gap-1">
            <span class="text-xs jetbrains-bold">Signin</span>
            <span class="pi pi-sign-in !text-xs"></span>
          </div>
        </p-button>
      </div>
    }

    @if (authService.isLoggedIn()) {
      <div class="block min-[769px]:hidden">
        <p-button
          icon="pi pi-user"
          [rounded]="true"
          variant="outlined"
          size="small"
          (onClick)="menuProfile.toggle($event)"
          class="mr-3"
        ></p-button>

        <p-menu #menuProfile [model]="items" [popup]="true" styleClass="text-xs" />
      </div>
    }
  </div>
</header>
