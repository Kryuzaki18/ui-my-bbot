<header
  class="bg-gray-900 flex items-center justify-center sticky top-0 z-20 w-full border-b border-gray-700"
>
  <div
    class="flex items-center justify-between container max-w-[1440px] w-full mx-auto px-2 md:px-0"
  >
    <div class="pl-3 flex items-center gap-2">
      <img src="/binance_logo.svg" alt="binance" width="20px" />
      <h1 class="text-emerald-500 text-md font-bold">BBot.v1</h1>
    </div>

    @if (authService.isLoggedIn()) {
      <div class="hidden min-[769px]:flex items-center px-2">
        <p-button variant="text" size="small" (onClick)="signout()" class="bg-green-900/20 rounded">
          <div class="flex items-center gap-1">
            <span class="pi pi-sign-out" style="font-size: 0.7rem"></span>
            <span class="text-[10px]">Signout</span>
          </div>
        </p-button>
      </div>
    } @else {
      <div class="flex items-center px-2">
        <p-button variant="text" size="small" (onClick)="signin()" class="bg-green-900/20 rounded">
          <div class="flex items-center gap-1">
            <span class="text-[10px]">Signin</span>
            <span class="pi pi-sign-in" style="font-size: 0.7rem"></span>
          </div>
        </p-button>
      </div>
    }

    @if (authService.isLoggedIn()) {
      <div class="block min-[769px]:hidden">
        <p-button
          icon="pi pi-user"
          [rounded]="true"
          variant="outlined"
          size="small"
          (onClick)="menuProfile.toggle($event)"
          class="mr-3"
        ></p-button>

        <p-menu #menuProfile [model]="items" [popup]="true" styleClass="text-xs" />
      </div>
    }
  </div>
</header>
