<header class="bg-gray-900 flex items-center justify-center sticky top-0 z-10">
  <div class="flex items-center justify-between container">
    <div class="pl-3 flex items-center gap-2">
      <img src="/binance_logo.svg" alt="binance" width="20px" />
      <h1 class="text-emerald-500 text-md font-bold">Trading Bot v1</h1>
    </div>
    <div>
      @if (authService.isLoggedIn()) {
        <p-button
          label="Signout"
          variant="outlined"
          size="small"
          icon="pi pi-sign-out"
          iconPos="right"
          (onClick)="signout()"
        />
      } @else {
        <p-button
          label="Signin"
          variant="outlined"
          size="small"
          icon="pi pi-sign-in"
          iconPos="right"
          (onClick)="signin()"
        />
      }
    </div>
  </div>
</header>
