<p-confirmDialog />

<p-toast [breakpoints]="{ '425px': { width: '95%', right: 'auto' } }" key="toaster">
  <ng-template let-message #message>
    <div class="flex justify-center items-center gap-1 flex-auto">
      <span class="font-medium text-xs">{{ message.summary }}</span>
      <span class="text-xs">{{ message.detail }}</span>
    </div>
  </ng-template>
</p-toast>

<p-scrollpanel [style]="{ width: '100%', height: '100vh' }">
  <router-outlet></router-outlet>
</p-scrollpanel>
